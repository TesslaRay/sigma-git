<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo Sigma</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a1628;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, #00b4d8 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, #0077b6 0%, transparent 45%),
                        radial-gradient(ellipse at 60% 80%, #00f5d4 0%, transparent 40%);
            opacity: 0.2;
            animation: shift 8s ease-in-out infinite alternate;
        }

        @keyframes shift {
            from { transform: scale(1); }
            to   { transform: scale(1.15) rotate(3deg); }
        }

        .card {
            position: relative;
            padding: 60px 80px;
            border-radius: 24px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 180, 216, 0.25);
            box-shadow: 0 8px 64px rgba(0, 119, 182, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00b4d8, #0077b6, #00f5d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 8px rgba(0, 180, 216, 0.5)); }
            to   { filter: drop-shadow(0 0 20px rgba(0, 119, 182, 0.8)); }
        }

        .sub {
            margin-top: 12px;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="card">
        <h1>Hola mundo Sigma</h1>
        <p class="sub">acá Fernando, Seba y Pablo</p>
    </div>
</body>
</html>
