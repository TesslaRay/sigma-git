<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .title {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00f5ff, #7b2ff7, #ff2d78);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite, fadeInDown 1s ease forwards;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 300;
            color: #ffffff;
            margin-top: 1rem;
            animation: fadeInUp 1s ease 0.4s both;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }

        .subtitle span {
            color: #00f5ff;
            font-weight: 700;
            animation: pulse 2s ease infinite;
            display: inline-block;
        }

        .line {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #00f5ff, #7b2ff7, #ff2d78);
            margin: 1.5rem auto;
            border-radius: 2px;
            animation: expandLine 1s ease 0.8s forwards;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
        }

        .orbs {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: #7b2ff7;
            top: -150px;
            left: -150px;
            animation: float1 8s ease-in-out infinite;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: #00f5ff;
            bottom: -100px;
            right: -100px;
            animation: float2 10s ease-in-out infinite;
        }

        .orb3 {
            width: 300px;
            height: 300px;
            background: #ff2d78;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float3 6s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expandLine {
            to { width: 300px; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(80px, 60px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-60px, -80px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }
    </style>
</head>
<body>

    <div class="orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <canvas id="particles"></canvas>

    <div class="container">
        <h1 class="title">Hola Mundo</h1>
        <p class="subtitle">Saludos para todo el equipo de Sigma Energía</p>
        <div class="line"></div>
        <p class="subtitle">Hola <span>Braulio</span></p>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const count = 120;

        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.5,
                dx: (Math.random() - 0.5) * 0.4,
                dy: (Math.random() - 0.5) * 0.4,
                alpha: Math.random() * 0.6 + 0.2,
                color: ['#00f5ff', '#7b2ff7', '#ff2d78'][Math.floor(Math.random() * 3)]
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fill();

                p.x += p.dx;
                p.y += p.dy;

                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
            });

            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
